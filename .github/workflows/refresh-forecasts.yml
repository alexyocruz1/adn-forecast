name: Refresh Forecasts

on:
  schedule:
    # Runs every hour
    - cron: '0 * * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Wake up Vercel deployment
        run: |
          echo "Pinging /api/health to warm up the serverless function..."
          curl --fail --silent --show-error \
            "https://adn-forecast.vercel.app/api/health"
          echo " ✅ Warm-up complete."

      - name: Wait for full initialization
        run: sleep 5

      - name: Sync Sports Mirror (ESPN API)
        run: |
          echo "🔄 Starting sports mirror synchronization..."
          # Install all project dependencies
          npm install
          # Run the sports scraper — pure Node.js fetch, no browser needed
          KV_REST_API_URL=${{ secrets.KV_REST_API_URL }} KV_REST_API_TOKEN=${{ secrets.KV_REST_API_TOKEN }} node scripts/sync-matches.js
          echo "✅ Sports mirror sync complete."

      - name: Refresh forecasts for TODAY (League by League)
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          echo "Refreshing forecasts for today: $TODAY"
          # Dynamically read leagues from our Single Source of Truth
          LEAGUES=$(node -e "console.log(Object.keys(require('./lib/leagues.json')).join(' '))")
          echo "Target Leagues: $LEAGUES"
          
          for LEAGUE in $LEAGUES; do
            echo "Fetching $LEAGUE..."
            RESPONSE=$(curl --fail --silent --show-error \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "https://adn-forecast.vercel.app/api/cron?date=$TODAY&league=$LEAGUE")
            echo "Response for $LEAGUE: $RESPONSE"
            echo "$RESPONSE" | grep -q '"success":true' && echo "✅ $LEAGUE succeeded." || echo "❌ $LEAGUE failed or returned unexpected response."
            sleep 10
          done

      - name: Sync Social Feed (Scraping)
        run: |
          echo "🔄 Starting social feed synchronization..."
          # Dependencies are already installed by the previous step
          CRON_SECRET=${{ secrets.CRON_SECRET }} node scripts/sync-social.js
          echo "✅ Social feed sync complete."

      - name: Upload Scraper Debug Screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-debug
          path: scraper-*.png
          retention-days: 1

      - name: Wait between dates (rate limit buffer)
        run: sleep 10

      - name: Refresh forecasts for TOMORROW (League by League)
        run: |
          TOMORROW=$(date -u -d "+1 day" +%Y-%m-%d 2>/dev/null || date -u -v+1d +%Y-%m-%d)
          echo "Refreshing forecasts for tomorrow: $TOMORROW"
          
          # Dynamically read leagues from our Single Source of Truth
          LEAGUES=$(node -e "console.log(Object.keys(require('./lib/leagues.json')).join(' '))")
          
          for LEAGUE in $LEAGUES; do
            echo "Fetching $LEAGUE..."
            RESPONSE=$(curl --fail --silent --show-error \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "https://adn-forecast.vercel.app/api/cron?date=$TOMORROW&league=$LEAGUE")
            echo "Response for $LEAGUE: $RESPONSE"
            echo "$RESPONSE" | grep -q '"success":true' && echo "✅ $LEAGUE succeeded." || echo "❌ $LEAGUE failed or returned unexpected response."
            sleep 10
          done

