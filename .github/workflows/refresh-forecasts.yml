name: Refresh Forecasts

on:
  schedule:
    # Runs every hour
    - cron: '0 * * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Vercel deployment
        run: |
          echo "Pinging /api/health to warm up the serverless function..."
          curl --fail --silent --show-error \
            "https://adn-forecast.vercel.app/api/health"
          echo " ✅ Warm-up complete."

      - name: Wait for full initialization
        run: sleep 5

      - name: Refresh forecasts for TODAY (League by League)
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          echo "Refreshing forecasts for today: $TODAY"
          for LEAGUE in PL PD SA BL1 FL1 DED PPL ELC BSA CL WC EC; do
            echo "Fetching $LEAGUE..."
            RESPONSE=$(curl --fail --silent --show-error \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "https://adn-forecast.vercel.app/api/cron?date=$TODAY&league=$LEAGUE")
            echo "Response for $LEAGUE: $RESPONSE"
            echo "$RESPONSE" | grep -q '"success":true' && echo "✅ $LEAGUE succeeded." || echo "❌ $LEAGUE failed or returned unexpected response."
            sleep 10
          done

      - name: Sync Social Feed (Scraping)
        uses: microsoft/playwright-github-action@v1
        with:
          run: |
            echo "🔄 Starting social feed synchronization..."
            npm install playwright
            # Run the scraper
            CRON_SECRET=${{ secrets.CRON_SECRET }} node scripts/scrape-tweets.js
            echo "✅ Social feed sync complete."

      - name: Wait between dates (rate limit buffer)
        run: sleep 10

      - name: Refresh forecasts for TOMORROW (League by League)
        run: |
          TOMORROW=$(date -u -d "+1 day" +%Y-%m-%d 2>/dev/null || date -u -v+1d +%Y-%m-%d)
          echo "Refreshing forecasts for tomorrow: $TOMORROW"
          for LEAGUE in PL PD SA BL1 FL1 DED PPL ELC BSA CL WC EC; do
            echo "Fetching $LEAGUE..."
            RESPONSE=$(curl --fail --silent --show-error \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "https://adn-forecast.vercel.app/api/cron?date=$TOMORROW&league=$LEAGUE")
            echo "Response for $LEAGUE: $RESPONSE"
            echo "$RESPONSE" | grep -q '"success":true' && echo "✅ $LEAGUE succeeded." || echo "❌ $LEAGUE failed or returned unexpected response."
            sleep 10
          done

