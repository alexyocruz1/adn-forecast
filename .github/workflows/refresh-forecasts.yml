name: Refresh Forecasts

on:
  schedule:
    # Runs every hour
    - cron: '0 * * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Vercel deployment
        run: |
          echo "Pinging /api/health to warm up the serverless function..."
          curl --fail --silent --show-error \
            "https://adn-forecast.vercel.app/api/health"
          echo " ✅ Warm-up complete."

      - name: Wait for full initialization
        run: sleep 5

      - name: Refresh forecasts for TODAY
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          echo "Refreshing forecasts for today: $TODAY"
          RESPONSE=$(curl --fail --silent --show-error \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://adn-forecast.vercel.app/api/cron?date=$TODAY")
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"success":true' && echo "✅ Today succeeded." || (echo "❌ Today failed." && exit 1)

      - name: Wait between calls (rate limit buffer)
        run: sleep 10

      - name: Refresh forecasts for TOMORROW
        run: |
          TOMORROW=$(date -u -d "+1 day" +%Y-%m-%d 2>/dev/null || date -u -v+1d +%Y-%m-%d)
          echo "Refreshing forecasts for tomorrow: $TOMORROW"
          RESPONSE=$(curl --fail --silent --show-error \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://adn-forecast.vercel.app/api/cron?date=$TOMORROW")
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"success":true' && echo "✅ Tomorrow succeeded." || (echo "❌ Tomorrow failed." && exit 1)
